# organize-downloads rules.conf
#
# STATUS / IMPORTANT: this file documents a config-file rule format, but the
# CURRENT organize-downloads.sh does NOT read it — that script has its rules
# hardcoded inline (the `move <Category> <globs>` block). This file is the spec
# for a planned config-driven version. Editing it has no effect on the shipped
# behavior today; to change real sorting now, edit organize-downloads.sh and
# re-run `./install.sh install`. Keep this file and the script in sync if/when
# config loading is added.
#
# Rule keywords (one per line; # comments; blank lines OK):
#   prefix       <CATEGORY> <literal-prefix>          e.g. prefix WhatsApp WhatsApp
#   ext          <CATEGORY> <ext1> [ext2 ...]         case-insensitive
#   date_bucket  <CATEGORY>                           use <CATEGORY>/YYYY-MM/ instead of flat
#   archive_days <CATEGORY> <N>                       after N days, move to <CATEGORY>/Archive/YYYY-MM/
#   other_to     <CATEGORY>                           catch-all for unmatched files (default Other; "" disables)
#
# Prefix rules run BEFORE extension rules; first match wins.
# Folders/ is always reserved for stray top-level folders.
# Edit this file freely — no reinstall needed.

# ---------- Source-pattern rules ----------
prefix Screenshots Screen Shot
prefix Screenshots Screenshot
prefix WhatsApp WhatsApp

# ---------- Extension rules ----------
ext Images       png jpg jpeg webp gif heic
ext Videos       mp4 mov m4v avi mkv
ext Audio        mp3 wav m4a flac aac ogg opus
ext Spreadsheets xlsx xls csv numbers tsv
ext PDFs         pdf
ext Documents    pptx ppt docx doc md txt rtf pages key
ext Installers   dmg pkg
ext Archives     zip rar 7z tar gz tgz
ext Code         json js ts py sh yaml yml toml xml
ext Design       psd ai sketch fig xd
ext Fonts        ttf otf woff woff2
ext Ebooks       epub mobi azw3
ext Subtitles    srt vtt
ext HTML         html htm
ext Calendar     ics

# ---------- Catch-all ----------
other_to Other

# ---------- Date-stamped sub-buckets (opt in) ----------
# date_bucket Images
# date_bucket Videos
# date_bucket Screenshots

# ---------- Age-based archival (opt in) ----------
# archive_days Other 30
# archive_days Screenshots 60
# archive_days Installers 30
